server.port=3001
spring.application.name=appointment-service

app.cors.allowed-origin=http://localhost:5173
app.jwt.secret=${APP_JWT_SECRET:ChangeMe-This-Needs-At-Least-32-Characters!}
app.jwt.expiration=86400000
app.sendgrid.enabled=${SENDGRID_ENABLED:True}

sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:adb01620@ucmo.edu}
sendgrid.from.name=${SENDGRID_FROM_NAME:Commerce Bank}

spring.datasource.url=jdbc:h2:file:./data/appointment-service;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jackson.serialization.write-dates-as-timestamps=false
